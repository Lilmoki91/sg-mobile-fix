name: 📤 Deploy Widget ke IPFS

on:
  push:
    branches: [main]

jobs:
  deploy-to-ipfs:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🌐 Setup IPFS + Upload Folder widget
        run: |
          # Pasang IPFS Kubo
          wget -q https://dist.ipfs.tech/kubo/v0.30.0/kubo_v0.30.0_linux-amd64.tar.gz
          tar -xzf kubo_v0.30.0_linux-amd64.tar.gz
          cd kubo
          sudo bash install.sh
          ipfs init
          ipfs daemon --offline &
          sleep 5
          cd ..

          # Upload folder widget sebagai direktori
          echo "📤 Memuat naik folder widget/ ke IPFS..."
          ipfs add -r widget/ --cid-version 1 > output.txt

          # Dapatkan CID folder (baris terakhir)
          CID=$(tail -n 1 output.txt | awk '{print $2}')

          echo "✅ CID Folder: $CID"
          echo "🔗 URL: https://ipfs.io/ipfs/$CID/"
          echo "🔗 URL: https://cloudflare-ipfs.com/ipfs/$CID/"
          echo "🔗 URL: https://gateway.pinata.cloud/ipfs/$CID/"
