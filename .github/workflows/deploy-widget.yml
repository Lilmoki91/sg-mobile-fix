name: 📤 Deploy Widget ke IPFS via Pinata

on:
  push:
    branches: [main]

jobs:
  deploy-to-ipfs:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 📤 Upload SEMUA fail dalam folder widget ke Pinata
        env:
          PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
          PINATA_SECRET_KEY: ${{ secrets.PINATA_SECRET_KEY }}
        run: |
          echo "📁 Auto-detect semua fail dalam folder widget/"
          
          cd sg-mobile-fix/widget/
          
          # Loop melalui SEMUA fail dalam folder
          for FILE in *; do
            if [ -f "$FILE" ]; then
              echo "📤 Upload: $FILE"
              curl -X POST "https://api.pinata.cloud/pinning/pinFileToIPFS" \
                -H "pinata_api_key: $PINATA_API_KEY" \
                -H "pinata_secret_api_key: $PINATA_SECRET_KEY" \
                -F "file=@$FILE" \
                -F "pinataMetadata={\"name\": \"$FILE\"}" \
                -F "pinataOptions={\"cidVersion\": 1}"
              echo ""
            fi
          done
          
          echo "✅ Selesai! Semua fail telah di-upload."
