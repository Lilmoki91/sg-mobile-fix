name: 📤 Deploy Widget ke IPFS (Direct + Zip Pin)

on:
  push:
    branches: [main]

jobs:
  deploy-to-ipfs:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🗜️ Mampatkan folder widget
        run: |
          echo "📁 Mampatkan folder widget/ ke widget.zip..."
          cd widget
          zip -r ../widget.zip .
          cd ..
          echo "✅ widget.zip sedia."
          echo "📁 Saiz fail: $(du -h widget.zip | cut -f1)"

      - name: 📤 Upload widget.zip ke Pinata
        env:
          PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
          PINATA_SECRET_KEY: ${{ secrets.PINATA_SECRET_KEY }}
        run: |
          echo "📤 Upload widget.zip ke Pinata..."
          
          # Hantar fail ZIP
          RESPONSE=$(curl -s -X POST "https://api.pinata.cloud/pinning/pinFileToIPFS" \
            -H "pinata_api_key: $PINATA_API_KEY" \
            -H "pinata_secret_api_key: $PINATA_SECRET_KEY" \
            -F "file=@widget.zip" \
            -F "pinataMetadata={\"name\": \"widget-folder-backup\"}" \
            -F "pinataOptions={\"cidVersion\": 1}")
          
          echo "Respons: $RESPONSE"
          
          # Semak jika berjaya
          if echo "$RESPONSE" | grep -q "IpfsHash"; then
            CID=$(echo $RESPONSE | grep -o '"IpfsHash":"[^"]*"' | cut -d'"' -f4)
            echo "✅ BERJAYA!"
            echo "📁 CID: $CID"
            echo "🔗 URL: https://gateway.pinata.cloud/ipfs/$CID"
          else
            echo "❌ Gagal: $RESPONSE"
            exit 1
          fi
